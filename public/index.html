<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayPal 新闻聚合</title>
  <link rel="icon" type="image/svg+xml" href="icon.png">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 登录/注册页面 -->
  <div id="auth-page" class="page">
    <div class="auth-container">
      <div class="auth-logo">
        <h1>PayPal 新闻聚合</h1>
        <p>每天自动汇总 PayPal 相关新闻</p>
      </div>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
      </div>

      <form id="auth-form" class="auth-form">
        <div class="form-group">
          <label for="email">邮箱</label>
          <input type="email" id="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" required placeholder="至少6位密码">
        </div>
        <button type="submit" class="btn-primary" id="auth-submit">登录</button>
      </form>

      <div id="auth-error" class="error-message"></div>
    </div>
  </div>

  <!-- 主应用页面 -->
  <div id="app-page" class="page hidden">
    <!-- 顶部导航栏 -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">PayPal 新闻</h1>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="refresh-btn" title="刷新新闻">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 4v6h-6M1 20v-6h6"/>
            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
          </svg>
        </button>
        <button class="btn-icon" id="settings-btn" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button class="btn-icon" id="logout-btn" title="退出登录">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 左侧：新闻列表 -->
      <aside class="news-sidebar">
        <div class="sidebar-header">
          <h2>新闻列表</h2>
          <span class="news-count" id="news-count">0 条</span>
        </div>
        <div class="news-filter">
          <select id="filter-date">
            <option value="all">所有新闻</option>
            <option value="today">今天</option>
            <option value="week">本周</option>
          </select>
        </div>
        <div class="news-list" id="news-list">
          <div class="loading">加载中...</div>
        </div>
      </aside>

      <!-- 右侧：新闻详情 -->
      <section class="news-detail" id="news-detail">
        <div class="detail-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
          <p>选择一条新闻查看详情</p>
        </div>
        <div class="detail-content hidden" id="detail-content">
          <h2 class="detail-title" id="detail-title"></h2>
          <div class="detail-meta">
            <span class="detail-source" id="detail-source"></span>
            <span class="detail-date" id="detail-date"></span>
          </div>
          <div class="detail-snippet" id="detail-snippet"></div>
          <a href="#" class="btn-read-more" id="detail-link" target="_blank">阅读原文</a>
          <button class="btn-mark-read" id="mark-read-btn">标记为已读</button>
        </div>
      </section>
    </main>
  </div>

  <!-- 设置弹窗 -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="modal-close" id="close-settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="notify-email">通知邮箱</label>
          <input type="email" id="notify-email" placeholder="接收每日汇总的邮箱">
        </div>
        <div class="form-group checkbox-group">
          <label>
            <input type="checkbox" id="notify-enabled">
            启用每日邮件通知
          </label>
        </div>
        <button class="btn-secondary" id="test-email-btn">发送测试邮件</button>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="save-settings">保存设置</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
